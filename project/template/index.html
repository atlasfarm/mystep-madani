<!DOCTYPE html>
<html>
<head>
    <title>Telegram Login</title>
</head>
<body>

<h2>Login dengan Telegram</h2>

<script async
src="https://telegram.org/js/telegram-widget.js?22"
data-telegram-login="Daftarmasuk13Bot"
data-size="large"
data-userpic="false"
data-request-access="write"
data-onauth="onTelegramAuth(user)">
</script>

<script>
function onTelegramAuth(user){

    fetch("/save",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify(user)
    });

    alert("Selamat datang " + user.first_name);

}
</script>
<script async
src="https://telegram.org/js/telegram-widget.js?22"
data-telegram-login="Daftarmasuk13Bot"
data-size="large"
data-userpic="false"
data-request-access="write"
data-onauth="onTelegramAuth(user)">
</script>

<script>
function onTelegramAuth(user) {
    console.log(user);
    alert("Selamat datang " + user.first_name);
}
</script>

</body>
</html>
